name: dataflow-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: dataflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dataflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dataflow_dev}
      POSTGRES_DB: ${POSTGRES_DB:-dataflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dataflow-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: